{% extends "base.html" %}

{% block title %}Exam in Progress{% endblock %}

{% block content %}
<div class="glass-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 class="gradient-text"><i class="fas fa-user-shield"></i> Examination Security</h2>
        <a href="{{ url_for('stop_exam', exam_id=exam_id) }}" class="btn btn-danger">
            <i class="fas fa-stop-circle"></i> Finish & Submit
        </a>
    </div>

    <div class="video-container">
        <img src="{{ url_for('video_feed', exam_id=exam_id) }}" class="video-feed" alt="Proctoring Feed">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span>SECURE PROCTORING ACTIVE</span>
        </div>
    </div>

    <div style="margin-top: 40px;">
        <h3 style="display: flex; align-items: center; gap: 10px; font-size: 1.25rem;">
            <i class="fas fa-list-ul" style="color: var(--primary);"></i> Security Incident Log
        </h3>
        <div id="violation-log" class="violation-list">
            <div id="no-violations"
                style="text-align: center; padding: 40px; border: 1px dashed var(--glass-border); border-radius: 12px; background: rgba(255,255,255,0.01);">
                <i class="fas fa-check-circle"
                    style="font-size: 30px; color: var(--success); margin-bottom: 10px; display: block;"></i>
                <p style="color: var(--text-muted);">Monitoring active. No violations detected.</p>
            </div>
        </div>
    </div>
</div>

<script>
    const examId = "{{ exam_id }}";
    let seenViolations = new Set();

    async function fetchViolations() {
        try {
            const response = await fetch(`/api/violations/${examId}`);
            const violations = await response.json();
            const logDiv = document.getElementById('violation-log');
            const placeholder = document.getElementById('no-violations');

            if (violations.length > 0 && placeholder) {
                placeholder.style.display = 'none';
            }

            violations.forEach(v => {
                const vKey = `${v.type}-${v.timestamp}`;
                if (!seenViolations.has(vKey)) {
                    seenViolations.add(vKey);

                    const div = document.createElement('div');
                    div.className = 'violation-item';
                    div.style.borderLeft = '4px solid var(--error)';
                    div.innerHTML = `
                        <div>
                            <span class="violation-type">${v.type.replace('_', ' ')}</span>
                            <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Incident Detected</div>
                        </div>
                        <span class="timestamp"><i class="far fa-clock"></i> ${new Date(v.timestamp).toLocaleTimeString()}</span>
                    `;
                    logDiv.prepend(div);

                    // Trigger a subtle vibration or sound if possible (optional)
                    if ('vibrate' in navigator) navigator.vibrate(200);
                }
            });
        } catch (err) {
            console.error("Failed to fetch violations", err);
        }
    }

    // Poll for violations every 3 seconds
    setInterval(fetchViolations, 3000);

    // Tab Switching Detection
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            console.warn("Tab switch detected!");
            fetch(`/api/log_violation/${examId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'TAB_SWITCH' })
            }).catch(err => console.error("Failed to log tab switch", err));
        }
    });
</script>
{% endblock %}
