{% extends "base.html" %}

{% block title %}Exam in Progress{% endblock %}

{% block content %}
<div class="glass-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 class="gradient-text"><i class="fas fa-user-shield"></i> Examination Security</h2>
        <a href="{{ url_for('stop_exam', exam_id=exam_id) }}" class="btn btn-danger">
            <i class="fas fa-stop-circle"></i> Finish & Submit
        </a>
    </div>

    <!-- Hidden components for frame capture -->
    <video id="webcam" autoplay playsinline muted style="display: none;"></video>
    <canvas id="proc-canvas" style="display: none;"></canvas>

    <div class="video-container">
        <!-- Display proctored frames from server -->
        <img id="proctor-display" src="" class="video-feed" alt="Initializing Security Feed..."
            style="background: #000; min-height: 480px;">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span>SECURE PROCTORING ACTIVE</span>
        </div>
    </div>

    <div style="margin-top: 40px;">
        <h3 style="display: flex; align-items: center; gap: 10px; font-size: 1.25rem;">
            <i class="fas fa-list-ul" style="color: var(--primary);"></i> Security Incident Log
        </h3>
        <div id="violation-log" class="violation-list">
            <div id="no-violations"
                style="text-align: center; padding: 40px; border: 1px dashed var(--glass-border); border-radius: 12px; background: rgba(255,255,255,0.01);">
                <i class="fas fa-check-circle"
                    style="font-size: 30px; color: var(--success); margin-bottom: 10px; display: block;"></i>
                <p style="color: var(--text-muted);">Monitoring active. No violations detected.</p>
            </div>
        </div>
    </div>
</div>

<script>
    const examId = "{{ exam_id }}";
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('proc-canvas');
    const display = document.getElementById('proctor-display');
    const logDiv = document.getElementById('violation-log');
    const placeholder = document.getElementById('no-violations');
    let seenViolations = new Set();

    async function initWebcam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        } catch (err) {
            console.error("Webcam error:", err);
            alert("Webcam is required for the exam. Please enable it.");
        }
    }

    async function captureAndSend() {
        if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

        canvas.width = 640;
        canvas.height = 480;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL('image/jpeg', 0.6);

        try {
            const response = await fetch(`/process_proctor_frame/${examId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });

            const data = await response.json();
            if (data.success) {
                display.src = data.image;
                if (data.violation) {
                    addViolationToLog(data.violation);
                }
            }
        } catch (err) {
            console.error("Proctoring API error:", err);
        }
    }

    function addViolationToLog(type) {
        // Prevent spamming the local log
        const bucket = Math.floor(Date.now() / 5000);
        const vKey = `${type}-${bucket}`;
        if (seenViolations.has(vKey)) return;
        seenViolations.add(vKey);

        if (placeholder) placeholder.style.display = 'none';

        const div = document.createElement('div');
        div.className = 'violation-item';
        div.style.borderLeft = '4px solid var(--error)';
        div.innerHTML = `
            <div>
                <span class="violation-type">${type.replace('_', ' ')}</span>
                <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Incident Detected</div>
            </div>
            <span class="timestamp"><i class="far fa-clock"></i> ${new Date().toLocaleTimeString()}</span>
        `;
        logDiv.prepend(div);
    }

    initWebcam().then(() => {
        setInterval(captureAndSend, 1000);
    });

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            fetch(`/api/log_violation/${examId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'TAB_SWITCH' })
            });
            addViolationToLog('TAB_SWITCH');
        }
    });
</script>
{% endblock %}
