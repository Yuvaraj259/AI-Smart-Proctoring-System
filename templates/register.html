{% extends "base.html" %}

{% block title %}Biometric Registration{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; width: 100%;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 class="gradient-text"><i class="fas fa-id-card"></i> Face Registration</h2>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <!-- Security Information -->
    <div
        style="background: rgba(99, 102, 241, 0.05); border: 1px solid var(--glass-border); border-radius: 15px; padding: 20px; margin-bottom: 30px; display: flex; gap: 15px; align-items: center;">
        <i class="fas fa-shield-alt" style="font-size: 24px; color: var(--primary);"></i>
        <div style="font-size: 0.85rem; color: var(--text-main);">
            <strong>Privacy Note:</strong> Your facial data is encrypted and used only for identity verification during
            active proctoring sessions.
        </div>
    </div>

    <div class="video-container"
        style="max-width: 100%; margin: 0 auto 30px auto; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(99, 102, 241, 0.1); border-radius: 20px;">
        <video id="webcam" autoplay playsinline muted
            style="width: 100%; transform: scaleX(-1); background: #000; display: block; border-radius: 18px;"></video>
        <canvas id="photo-canvas" style="display: none;"></canvas>
        <div class="status-badge" id="camera-badge" style="display: none;">
            <div class="status-dot"></div>
            <span>LIVE FEED ACTIVE</span>
        </div>
    </div>

    <!-- Registration Form -->
    <div style="text-align: center; max-width: 400px; margin: 0 auto;">
        <div class="form-group" style="margin-bottom: 25px;">
            <label for="reg_student_id"
                style="display: block; text-align: left; color: var(--text-muted); margin-bottom: 10px; font-size: 0.85rem; text-transform: uppercase;">Student
                ID Verification</label>
            <div style="position: relative;">
                <i class="fas fa-user-tag"
                    style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="text" id="reg_student_id" class="input-field" placeholder="e.g. STU001"
                    style="padding-left: 45px; margin-bottom: 0;">
            </div>
        </div>

        <button id="capture-btn" class="btn btn-primary" style="width: 100%; padding: 15px; margin-bottom: 20px;"
            disabled>
            <i class="fas fa-circle-notch fa-spin"></i> Initializing System...
        </button>

        <div id="status-msg"
            style="min-height: 30px; border-radius: 10px; padding: 10px; font-size: 0.9rem; display: none;"></div>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    const statusMsg = document.getElementById('status-msg');
    const studentIdInput = document.getElementById('reg_student_id');
    const cameraBadge = document.getElementById('camera-badge');

    function showStatus(msg, type = 'info') {
        statusMsg.style.display = 'block';
        statusMsg.style.background = type === 'error' ? 'rgba(239, 68, 68, 0.1)' :
            type === 'success' ? 'rgba(34, 197, 94, 0.1)' :
                'rgba(99, 102, 241, 0.1)';
        statusMsg.style.color = type === 'error' ? 'var(--error)' :
            type === 'success' ? 'var(--success)' :
                'var(--primary)';

        const icon = type === 'error' ? '<i class="fas fa-exclamation-triangle"></i> ' :
            type === 'success' ? '<i class="fas fa-check-circle"></i> ' :
                '<i class="fas fa-spinner fa-spin"></i> ';

        statusMsg.innerHTML = icon + msg;
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                captureBtn.disabled = false;
                captureBtn.innerHTML = '<i class="fas fa-camera"></i> Capture Biometrics';
                cameraBadge.style.display = 'flex';
                showStatus('Align your face within the frame.', 'info');
            };
        } catch (err) {
            console.error("Camera error:", err);
            showStatus('Camera access denied. Please check permissions.', 'error');
            captureBtn.innerHTML = '<i class="fas fa-sync"></i> Retry';
            captureBtn.disabled = false;
            captureBtn.onclick = () => window.location.reload();
        }
    }

    initCamera();

    captureBtn.addEventListener('click', async () => {
        const studentId = studentIdInput.value.trim();
        if (!studentId) {
            showStatus('Please enter your Student ID.', 'error');
            return;
        }

        showStatus('Analyzing biometric signature...', 'loading');
        captureBtn.disabled = true;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        const imageData = canvas.toDataURL('image/jpeg', 0.8);

        try {
            const response = await fetch('/register_face', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_id: studentId,
                    image: imageData
                })
            });

            const result = await response.json();
            if (result.success) {
                showStatus('Biometric registration complete!', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                showStatus(result.message || 'Registration failed.', 'error');
                captureBtn.disabled = false;
            }
        } catch (err) {
            showStatus('Connection lost. Please try again.', 'error');
            captureBtn.disabled = false;
        }
    });
</script>
{% endblock %}
